<div class="mat-table-wrapper">
  <div class="table-scroll">
    <table mat-table [dataSource]="dataSource" class="w-full">
 
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="table-header col-equal">
          <div class="flex items-center gap-2">
 
            ファイル名
          </div>
        </th>
        <td mat-cell *matCellDef="let element" class="table-cell col-equal">
          <div class="flex items-center gap-3">
            <div class="file-icon">
              <span class="material-icons text-red-500 text-2xl">picture_as_pdf</span>
            </div>
            <span class="font-medium text-slate-800 text-base">{{ element.name }}</span>
          </div>
        </td>
      </ng-container> 
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="table-header col-equal">
          <div class="flex items-center gap-2">
            ステータス
          </div>
        </th>
        <td mat-cell *matCellDef="let element" class="table-cell col-equal">
          <span class=" flex items-center gap-x-2  " [ngClass]="{
            'status-signed': element.signatureCount === 1,
            'status-unsigned': element.signatureCount === 0
          }">
            <span class="material-icons  leading-none">
              {{ element.signatureCount === 1 ? 'check_circle' : 'radio_button_unchecked' }}
            </span>
            {{ element.signatureCount === 1 ? '署名済み' : '未署名' }}
          </span>
        </td>
      </ng-container>
 
      <ng-container matColumnDef="action" class=" ">
        <th mat-header-cell *matHeaderCellDef class="table-header ">
          <div class="flex items-center gap-2"> 
            操作
          </div>
        </th>
        <td mat-cell *matCellDef="let element" class="table-cell">
          <div class="flex items-center gap-3  ">
            <button (click)="onEdit(element)" class="action-btn action-btn-edit">
              <span class="material-icons text-xl">{{ element.signatureCount === 1 ? 'visibility' : 'edit' }}</span>
              <span>{{ element.signatureCount === 1 ? '閲覧' : '署名' }}</span>
            </button>
            <button
              (click)="onDelete(element)"
              [disabled]="element.signatureCount == 0"
              class="action-btn "
              [ngClass]="{
                'action-btn-delete': element.signatureCount != 0,
                'action-btn-disabled': element.signatureCount == 0
              }">
              <span class="material-icons text-xl">delete</span>
              <span>削除</span>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="labels; sticky: true" ></tr>
      <tr mat-row *matRowDef="let row; columns: labels;" class="table-row"></tr>
    </table>
  </div>

  <div class="paginator-wrapper">
    <mat-paginator
      [pageSizeOptions]="[10, 25, 50, 100]"
      showFirstLastButtons
      aria-label="Select page">
    </mat-paginator>
  </div>
</div>
