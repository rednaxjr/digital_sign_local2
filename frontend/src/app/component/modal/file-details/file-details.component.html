<div class="modal-layout" [class.pdf-expanded]="isPdfExpanded" [class.sig-open]="isSigPanelOpen">
 
    <div class="panel pdf-panel">
        <div class="panel-header">
            <span class="material-icons pdf-icon">picture_as_pdf</span>
            <span class="panel-title">{{ data.pdf.name }}</span>
            <button class="header-close-btn" (click)="close()" title="Close">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="pdf-body">
            <pdf-viewer
                [src]="data.pdf.url"
                [render-text]="true"
                [original-size]="false"
                class="w-full h-full">
            </pdf-viewer> 
            <button class="pdf-toggle-btn" (click)="togglePdf()" [title]="isPdfExpanded ? 'Restore' : 'Maximize'">
                <span class="material-icons">{{ isPdfExpanded ? 'close_fullscreen' : 'open_in_full' }}</span>
            </button>
        </div>
    </div>
 
    <div class="panel sig-panel">

        <div class="panel-header">
            <span class="material-icons sig-icon">draw</span>
            <span class="panel-title">
                {{ data.pdf.signatureCount === 1 ? '保存済み署名' : '署名を描いてください' }}
            </span>
            <button class="header-collapse-btn" (click)="toggleSigPanel()" title="Collapse">
                <span class="material-icons">keyboard_arrow_down</span>
            </button>
        </div>
        <div class="sig-body" [hidden]="data.pdf.signatureCount == 1">
            <div class="canvas-wrapper" #canvasContainer>
                <canvas #canvas class="canvas-el"></canvas>
                <div *ngIf="isEmpty" class="canvas-placeholder">
                    <span class="material-icons" style="font-size:56px;color:#4338ca">gesture</span>
                    <span class="placeholder-text">ここに署名</span>
                </div>
                <div class="sig-line"></div>
            </div>
        </div> 
        <div class="sig-body" [hidden]="data.pdf.signatureCount == 0">
            <div class="canvas-wrapper">
                <img *ngIf="data.pdf.signatures.length > 0"
                    [src]="data.pdf.signatures[0].url"
                    class="absolute inset-0 w-full h-full object-contain p-4" />
                <div class="sig-line"></div>
            </div>
        </div> 
        <div class="btn-row">

            <ng-container *ngIf="data.pdf.signatureCount == 0">
                <button (click)="save()" class="btn btn-save"
                    [class.btn-disabled]="isEmpty" [disabled]="isEmpty">
                    <span class="material-icons">save</span>
                    署名を保存
                </button>
                <button (click)="clear()" *ngIf="!isEmpty" class="btn btn-outline">
                    <span class="material-icons">restart_alt</span>
                    クリア
                </button>
                <button (click)="close()" class="btn btn-outline">
                    キャンセル
                </button>
            </ng-container>

            <ng-container *ngIf="data.pdf.signatureCount == 1">
                <button (click)="close()" class="btn btn-outline">
                    閉じる
                </button>
            </ng-container>

        </div>
    </div>

   
    <button class="sig-toggle-btn" (click)="toggleSigPanel()" title="Show signature">
        <span class="material-icons">keyboard_arrow_up</span>
    </button>

</div>
